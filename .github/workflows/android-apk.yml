name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches: ["claude/samurott-vgc-team-woglbi", "main"]
    paths:
      - "champions-team-building/app/**"
      - "mobile/**"
      - ".github/workflows/android-apk.yml"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Install Capacitor + stage web assets
        run: |
          cd mobile
          npm install --no-audit --no-fund
          rm -rf www && mkdir www
          cp -r ../champions-team-building/app/. www/
      - name: Scaffold + sync Android project
        run: |
          cd mobile
          npx cap add android
          npx cap sync android
      - name: Build debug APK
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk champions-team-builder.apk
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: champions-team-builder-apk
          path: champions-team-builder.apk
          if-no-files-found: error
      - name: Publish to a permanent Release (no login needed to download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Champions Team Builder — Android (latest)
          body: |
            Offline Android build of the Champions Team Builder.
            The full Champions sim (Battle Lab + Arena + optimizer) runs in-app — no server, works with no internet.
            Install: download the .apk, allow "install from unknown sources", tap to install.
          files: champions-team-builder.apk
          make_latest: "true"
